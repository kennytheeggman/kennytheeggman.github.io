<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var count = 2;
        function nextEl(eNum) {
            document.getElementById("source").setAttribute("src","f"+eNum+".mp4");
            document.getElementById("video").load();
            document.getElementById("video").play();
        }
        document.addEventListener("click", ()=> {
            if (count < 8) {
            nextEl(count);
            count++;
            }
            else {
                count=1;
                nextEl(count);
                count++;
            }
        });
    </script>
    <style>
        body{
            background-color: #191919;
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
            
            display: flex;
            justify-content: center;
        }
        video{
            width:537px;
            height:540px;
            
            margin-top: 200px;
        }
    </style>
</head>
<body>
    <video autoplay muted id="video">
        <source src="f1.mp4" type="video/mp4" id="source">
    </video>
</body>
</html>
